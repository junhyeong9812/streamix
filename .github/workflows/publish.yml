name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'
  release:
    types: [ created ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 2.0.1)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Resolve release version
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "release" ]; then
            echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: ./gradlew build -PreleaseVersion=$RELEASE_VERSION

      - name: Publish to Maven Central
        run: |
          ./gradlew :streamix-core:publishToMavenCentralPortal -PreleaseVersion=$RELEASE_VERSION
          ./gradlew :streamix-spring-boot-starter:publishToMavenCentralPortal -PreleaseVersion=$RELEASE_VERSION
        env:
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          SIGNING_PASSWORD: ${{ secrets.GPG_PASSPHRASE }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
