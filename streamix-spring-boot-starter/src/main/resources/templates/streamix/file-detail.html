<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{streamix/layout}">
<head>
  <title th:text="${file.originalName}">파일 상세</title>
</head>
<body>
<div layout:fragment="content">

  <nav class="streamix-breadcrumb" aria-label="경로">
    <a th:href="@{${@streamixProperties.dashboard.path}}">DASHBOARD</a>
    <span class="streamix-breadcrumb-sep" aria-hidden="true">/</span>
    <a th:href="@{${@streamixProperties.dashboard.path} + '/files'}">FILES</a>
    <span class="streamix-breadcrumb-sep" aria-hidden="true">/</span>
    <span class="streamix-breadcrumb-current"
          th:text="${#strings.abbreviate(file.originalName, 40)}"></span>
  </nav>

  <header class="streamix-mast">
    <div class="streamix-grow-1">
      <h1 class="streamix-mast-title streamix-mast-title--compact streamix-truncate"
          th:text="${file.originalName}"
          th:title="${file.originalName}">파일명</h1>
      <div class="streamix-mast-sub">
        <span class="streamix-mast-rule" aria-hidden="true"></span>
        <span class="streamix-badge"
              th:classappend="|streamix-badge--${#strings.toLowerCase(file.type.name())}|"
              th:text="${file.type}"></span>
        <span class="streamix-mono streamix-muted" th:text="${file.contentType}"></span>
      </div>
    </div>
    <div class="streamix-mast-actions">
      <a class="streamix-btn streamix-btn--primary"
         th:href="@{${@streamixProperties.api.basePath} + '/files/' + ${file.id} + '/stream'}"
         target="_blank" rel="noopener">
        <svg class="streamix-icon" aria-hidden="true">
          <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-play-fill|"></use>
        </svg>
        <span>스트리밍</span>
      </a>
      <button type="button" class="streamix-btn streamix-btn--danger"
              data-streamix-modal-target="streamix-delete-modal"
              th:data-file-id="${file.id}"
              th:data-file-name="${file.originalName}">
        <svg class="streamix-icon" aria-hidden="true">
          <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-trash|"></use>
        </svg>
        <span>삭제</span>
      </button>
    </div>
  </header>

  <section class="streamix-grid-2">

    <div class="streamix-grid-stack">

      <article class="streamix-card">
        <header class="streamix-card-head">
          <div class="streamix-card-head-title">
            <svg class="streamix-icon" aria-hidden="true">
              <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-eye|"></use>
            </svg>
            <span>Preview</span>
          </div>
        </header>
        <div class="streamix-card-body streamix-card-body--flush">

          <div th:if="${file.type.name() == 'VIDEO'}" class="streamix-media">
            <video controls preload="metadata"
                   th:poster="${file.thumbnailPath != null ? @streamixProperties.api.basePath + '/files/' + file.id + '/thumbnail' : ''}">
              <source th:src="@{${@streamixProperties.api.basePath} + '/files/' + ${file.id} + '/stream'}"
                      th:type="${file.contentType}">
              브라우저가 비디오 재생을 지원하지 않습니다.
            </video>
          </div>

          <div th:if="${file.type.name() == 'IMAGE'}" class="streamix-media streamix-media--padded">
            <img th:src="@{${@streamixProperties.api.basePath} + '/files/' + ${file.id} + '/stream'}"
                 th:alt="${file.originalName}">
          </div>

          <div th:if="${file.type.name() == 'AUDIO'}" class="streamix-media streamix-media--padded">
            <div class="streamix-media-fallback">
              <svg class="streamix-media-fallback-icon streamix-icon--type-audio" aria-hidden="true">
                <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-music-note-beamed|"></use>
              </svg>
              <div class="streamix-display streamix-display--sm" th:text="${file.originalName}">파일명</div>
              <audio controls preload="metadata">
                <source th:src="@{${@streamixProperties.api.basePath} + '/files/' + ${file.id} + '/stream'}"
                        th:type="${file.contentType}">
                브라우저가 오디오 재생을 지원하지 않습니다.
              </audio>
            </div>
          </div>

          <div th:if="${file.type.name() == 'DOCUMENT'}" class="streamix-media streamix-media--padded">
            <div class="streamix-media-fallback">
              <svg class="streamix-media-fallback-icon streamix-icon--type-document" aria-hidden="true">
                <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-file-earmark-text|"></use>
              </svg>
              <div class="streamix-display streamix-display--sm" th:text="${file.originalName}">문서 파일</div>
              <div class="streamix-mono streamix-muted" th:text="${file.contentType}"></div>
              <a class="streamix-btn streamix-btn--primary"
                 th:href="@{${@streamixProperties.api.basePath} + '/files/' + ${file.id} + '/stream'}"
                 target="_blank" rel="noopener">
                <svg class="streamix-icon" aria-hidden="true">
                  <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-download|"></use>
                </svg>
                <span>다운로드 / 열기</span>
              </a>
            </div>
          </div>

          <div th:if="${file.type.name() == 'ARCHIVE'}" class="streamix-media streamix-media--padded">
            <div class="streamix-media-fallback">
              <svg class="streamix-media-fallback-icon streamix-icon--type-archive" aria-hidden="true">
                <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-file-earmark-zip|"></use>
              </svg>
              <div class="streamix-display streamix-display--sm" th:text="${file.originalName}">압축 파일</div>
              <div class="streamix-mono streamix-muted" th:text="${file.contentType}"></div>
              <a class="streamix-btn streamix-btn--primary"
                 th:href="@{${@streamixProperties.api.basePath} + '/files/' + ${file.id} + '/stream'}"
                 target="_blank" rel="noopener">
                <svg class="streamix-icon" aria-hidden="true">
                  <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-download|"></use>
                </svg>
                <span>다운로드</span>
              </a>
            </div>
          </div>

          <div th:if="${file.type.name() == 'OTHER'}" class="streamix-media streamix-media--padded">
            <div class="streamix-media-fallback">
              <svg class="streamix-media-fallback-icon" aria-hidden="true">
                <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-file-earmark|"></use>
              </svg>
              <div class="streamix-display streamix-display--sm" th:text="${file.originalName}">파일</div>
              <div class="streamix-mono streamix-muted" th:text="${file.contentType}"></div>
              <a class="streamix-btn streamix-btn--primary"
                 th:href="@{${@streamixProperties.api.basePath} + '/files/' + ${file.id} + '/stream'}"
                 target="_blank" rel="noopener">
                <svg class="streamix-icon" aria-hidden="true">
                  <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-download|"></use>
                </svg>
                <span>다운로드</span>
              </a>
            </div>
          </div>

        </div>
      </article>

      <article class="streamix-card">
        <header class="streamix-card-head">
          <div class="streamix-card-head-title">
            <svg class="streamix-icon" aria-hidden="true">
              <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-link-45deg|"></use>
            </svg>
            <span>Endpoints</span>
          </div>
        </header>
        <div class="streamix-card-body">
          <div>
            <label class="streamix-label" for="streamUrl">스트리밍 URL</label>
            <div class="streamix-url">
              <input type="text" readonly id="streamUrl"
                     th:value="${@streamixProperties.api.basePath + '/files/' + file.id + '/stream'}">
              <button type="button" data-streamix-copy="streamUrl">COPY</button>
            </div>
          </div>

          <div th:if="${file.thumbnailPath != null}">
            <label class="streamix-label" for="thumbnailUrl">썸네일 URL</label>
            <div class="streamix-url">
              <input type="text" readonly id="thumbnailUrl"
                     th:value="${@streamixProperties.api.basePath + '/files/' + file.id + '/thumbnail'}">
              <button type="button" data-streamix-copy="thumbnailUrl">COPY</button>
            </div>
          </div>

          <div>
            <label class="streamix-label" for="metaUrl">메타데이터 API</label>
            <div class="streamix-url">
              <input type="text" readonly id="metaUrl"
                     th:value="${@streamixProperties.api.basePath + '/files/' + file.id}">
              <button type="button" data-streamix-copy="metaUrl">COPY</button>
            </div>
          </div>
        </div>
      </article>

    </div>

    <div class="streamix-grid-stack">

      <article class="streamix-card">
        <header class="streamix-card-head">
          <div class="streamix-card-head-title">
            <svg class="streamix-icon" aria-hidden="true">
              <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-info-circle|"></use>
            </svg>
            <span>File Info</span>
          </div>
        </header>
        <div class="streamix-card-body streamix-card-body--flush">
          <div class="streamix-info-grid">
            <div class="streamix-info-cell">
              <div class="streamix-info-label">File ID</div>
              <div class="streamix-info-value streamix-info-value--mono" th:text="${file.id}"></div>
            </div>
            <div class="streamix-info-cell">
              <div class="streamix-info-label">Type</div>
              <div class="streamix-info-value" th:text="${file.type}"></div>
            </div>
            <div class="streamix-info-cell">
              <div class="streamix-info-label">MIME</div>
              <div class="streamix-info-value streamix-info-value--mono" th:text="${file.contentType}"></div>
            </div>
            <div class="streamix-info-cell">
              <div class="streamix-info-label">Size</div>
              <div class="streamix-info-value streamix-mono" th:text="${file.formattedSize}">0 B</div>
            </div>
            <div class="streamix-info-cell">
              <div class="streamix-info-label">Thumbnail</div>
              <div class="streamix-info-value">
                <span th:if="${file.thumbnailPath != null}">YES</span>
                <span th:if="${file.thumbnailPath == null}" class="streamix-muted">NO</span>
              </div>
            </div>
            <div class="streamix-info-cell">
              <div class="streamix-info-label">Uploaded</div>
              <div class="streamix-info-value streamix-mono"
                   th:text="${#temporals.format(file.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></div>
            </div>
            <div class="streamix-info-cell" th:if="${file.updatedAt != null}">
              <div class="streamix-info-label">Updated</div>
              <div class="streamix-info-value streamix-mono"
                   th:text="${#temporals.format(file.updatedAt, 'yyyy-MM-dd HH:mm:ss')}"></div>
            </div>
          </div>
        </div>
      </article>

      <article class="streamix-card" th:if="${fileStats != null}">
        <header class="streamix-card-head">
          <div class="streamix-card-head-title">
            <svg class="streamix-icon" aria-hidden="true">
              <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-bar-chart|"></use>
            </svg>
            <span>Streaming Stats</span>
          </div>
        </header>
        <div class="streamix-card-body">
          <div class="streamix-stack streamix-stack--flush">
            <div class="streamix-row-stat">
              <span class="streamix-row-stat-label">총 스트리밍</span>
              <span class="streamix-row-stat-value" th:text="${fileStats.streamCount}">0</span>
            </div>
            <div class="streamix-row-stat">
              <span class="streamix-row-stat-label">총 전송량</span>
              <span class="streamix-row-stat-value" th:text="${fileStats.totalBytesSentFormatted}">0 B</span>
            </div>
          </div>
        </div>
      </article>

      <article class="streamix-card" th:if="${file.thumbnailPath != null}">
        <header class="streamix-card-head">
          <div class="streamix-card-head-title">
            <svg class="streamix-icon" aria-hidden="true">
              <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-image|"></use>
            </svg>
            <span>Thumbnail</span>
          </div>
        </header>
        <div class="streamix-card-body streamix-card-body--center">
          <img th:src="@{${@streamixProperties.api.basePath} + '/files/' + ${file.id} + '/thumbnail'}"
               class="streamix-thumbnail-preview"
               th:alt="|${file.originalName} 썸네일|">
        </div>
      </article>

    </div>
  </section>

  <!-- Delete Modal (fragment) -->
  <th:block th:replace="~{streamix/fragments :: deleteModal(${file.originalName})}"></th:block>

</div>
</body>
</html>
