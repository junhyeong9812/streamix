<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{streamix/layout}">
<head>
  <title>파일 관리</title>
</head>
<body>
<div layout:fragment="content">

  <header class="streamix-mast">
    <div>
      <h1 class="streamix-mast-title">Files</h1>
      <div class="streamix-mast-sub">
        <span class="streamix-mast-rule" aria-hidden="true"></span>
        <span class="streamix-meta">Media Library · <span th:text="${totalElements}">0</span> assets</span>
      </div>
    </div>
    <div class="streamix-mast-actions">
      <button type="button" class="streamix-btn streamix-btn--primary"
              data-streamix-modal-target="streamix-upload-modal">
        <svg class="streamix-icon" aria-hidden="true">
          <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-cloud-upload|"></use>
        </svg>
        <span>파일 업로드</span>
      </button>
    </div>
  </header>

  <article class="streamix-card">
    <header class="streamix-card-head">
      <div class="streamix-card-head-title">
        <svg class="streamix-icon" aria-hidden="true">
          <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-folder|"></use>
        </svg>
        <span>Catalog</span>
      </div>
      <span class="streamix-badge" th:text="|${totalElements} TOTAL|">0 TOTAL</span>
    </header>

    <div class="streamix-card-body streamix-card-body--flush">
      <div th:if="${#lists.isEmpty(files)}" class="streamix-empty">
        <svg class="streamix-empty-icon" aria-hidden="true">
          <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-folder-x|"></use>
        </svg>
        <div class="streamix-empty-title">업로드된 파일이 없습니다</div>
        <div class="streamix-empty-text">아래 버튼을 클릭하여 첫 번째 파일을 추가하세요.</div>
        <button type="button" class="streamix-btn streamix-btn--primary"
                data-streamix-modal-target="streamix-upload-modal">
          <svg class="streamix-icon" aria-hidden="true">
            <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-cloud-upload|"></use>
          </svg>
          <span>첫 번째 파일 업로드</span>
        </button>
      </div>

      <div th:unless="${#lists.isEmpty(files)}" class="streamix-table-wrap">
        <table class="streamix-table">
          <thead>
          <tr>
            <th scope="col" style="width: 70px;">Preview</th>
            <th scope="col">Name</th>
            <th scope="col" style="width: 100px;">Type</th>
            <th scope="col" style="width: 90px;">Size</th>
            <th scope="col" style="width: 140px;">Uploaded</th>
            <th scope="col" style="width: 160px;">Actions</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="file : ${files}">
            <td>
              <img th:if="${file.thumbnailPath != null}"
                   class="streamix-thumb"
                   th:src="@{${@streamixProperties.api.basePath} + '/files/' + ${file.id} + '/thumbnail'}"
                   alt="">
              <div th:if="${file.thumbnailPath == null}"
                   class="streamix-file-icon"
                   th:classappend="|streamix-file-icon--${#strings.toLowerCase(file.type.name())}|">
                <th:block th:replace="~{streamix/fragments :: fileTypeIcon(${file.type.name()})}"></th:block>
              </div>
            </td>
            <td>
              <div class="streamix-table-name" th:text="${file.originalName}" th:title="${file.originalName}"></div>
              <div class="streamix-table-id streamix-mono"
                   th:text="|ID · ${#strings.abbreviate(file.id.toString(), 22)}|"></div>
            </td>
            <td>
              <span class="streamix-badge"
                    th:classappend="|streamix-badge--${#strings.toLowerCase(file.type.name())}|"
                    th:text="${file.type}"></span>
            </td>
            <td class="streamix-mono" th:text="${file.formattedSize}">0 B</td>
            <td class="streamix-mono"
                th:text="${#temporals.format(file.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
            <td>
              <div class="streamix-btn-group">
                <a class="streamix-btn streamix-btn--ghost streamix-btn--icon"
                   th:href="@{${@streamixProperties.api.basePath} + '/files/' + ${file.id} + '/stream'}"
                   target="_blank" rel="noopener"
                   title="스트리밍" aria-label="새 탭에서 스트리밍">
                  <svg class="streamix-icon" aria-hidden="true">
                    <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-play-fill|"></use>
                  </svg>
                </a>
                <a class="streamix-btn streamix-btn--ghost streamix-btn--icon"
                   th:href="@{${@streamixProperties.dashboard.path} + '/files/' + ${file.id}}"
                   title="상세 보기" aria-label="상세 보기">
                  <svg class="streamix-icon" aria-hidden="true">
                    <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-eye|"></use>
                  </svg>
                </a>
                <button type="button"
                        class="streamix-btn streamix-btn--ghost streamix-btn--icon"
                        data-streamix-modal-target="streamix-delete-modal"
                        th:data-file-id="${file.id}"
                        th:data-file-name="${file.originalName}"
                        title="삭제" aria-label="파일 삭제">
                  <svg class="streamix-icon streamix-icon--destructive" aria-hidden="true">
                    <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-trash|"></use>
                  </svg>
                </button>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>

    <footer th:if="${totalPages > 1}" class="streamix-card-foot">
      <nav class="streamix-pagination" aria-label="페이지 이동">
        <a class="streamix-page"
           th:classappend="${currentPage == 0 ? 'is-disabled' : ''}"
           th:href="@{${@streamixProperties.dashboard.path} + '/files'(page=${currentPage - 1})}"
           aria-label="이전">
          <svg class="streamix-icon streamix-icon--sm" aria-hidden="true">
            <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-chevron-left|"></use>
          </svg>
        </a>
        <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
           class="streamix-page"
           th:classappend="${i == currentPage ? 'is-active' : ''}"
           th:href="@{${@streamixProperties.dashboard.path} + '/files'(page=${i})}"
           th:text="${i + 1}"></a>
        <a class="streamix-page"
           th:classappend="${currentPage == totalPages - 1 ? 'is-disabled' : ''}"
           th:href="@{${@streamixProperties.dashboard.path} + '/files'(page=${currentPage + 1})}"
           aria-label="다음">
          <svg class="streamix-icon streamix-icon--sm" aria-hidden="true">
            <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-chevron-right|"></use>
          </svg>
        </a>
      </nav>
    </footer>
  </article>

  <!-- Upload Modal -->
  <div class="streamix-modal-overlay" id="streamix-upload-modal" role="dialog" aria-modal="true" aria-labelledby="upload-modal-title">
    <div class="streamix-modal">
      <header class="streamix-modal-head">
        <h2 id="upload-modal-title" class="streamix-modal-title">파일 업로드</h2>
        <button type="button" class="streamix-btn streamix-btn--ghost streamix-btn--icon"
                data-streamix-modal-close aria-label="닫기">
          <svg class="streamix-icon" aria-hidden="true">
            <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-x-lg|"></use>
          </svg>
        </button>
      </header>
      <div class="streamix-modal-body">
        <div class="streamix-upload" data-streamix-upload>
          <svg class="streamix-icon streamix-icon--2xl streamix-upload-icon" aria-hidden="true">
            <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-cloud-arrow-up|"></use>
          </svg>
          <div class="streamix-upload-title">클릭하거나 파일을 드래그하세요</div>
          <div class="streamix-upload-meta">
            <span th:if="${@streamixProperties.storage.isAllTypesAllowed()}">모든 파일</span>
            <span th:unless="${@streamixProperties.storage.isAllTypesAllowed()}"
                  th:text="${T(java.lang.String).join(' · ', @streamixProperties.storage.allowedTypes)}"></span>
            <span th:if="${@streamixProperties.storage.maxFileSize > 0}">
              &nbsp;·&nbsp;
              <span th:text="|MAX ${#numbers.formatDecimal(@streamixProperties.storage.maxFileSize / 1024.0 / 1024.0, 1, 0)}MB|"></span>
            </span>
          </div>
        </div>
        <input type="file" data-streamix-upload-input class="streamix-hidden">

        <div data-streamix-upload-progress class="streamix-progress streamix-hidden streamix-mt-4">
          <div class="streamix-progress-bar streamix-progress-bar--accent"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Modal (fragment) -->
  <th:block th:replace="~{streamix/fragments :: deleteModal(${null})}"></th:block>

</div>
</body>
</html>
