<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title layout:title-pattern="$CONTENT_TITLE — Streamix">Streamix</title>

  <script th:inline="none">
    (function () {
      try {
        var stored = localStorage.getItem('streamix.theme');
        var theme = (stored === 'light' || stored === 'dark') ? stored
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        if (theme === 'dark') document.documentElement.classList.add('dark');
      } catch (e) { /* localStorage 비활성 환경 */ }
    })();
  </script>

  <link rel="stylesheet" th:href="@{/streamix/css/streamix.css}">
  <link rel="preload" as="image" type="image/svg+xml" th:href="@{/streamix/svg/icons.svg}">
</head>
<body th:data-api-base-path="${@streamixProperties.api.basePath}"
      th:data-allowed-types="${#strings.listJoin(@streamixProperties.storage.allowedTypes, ',')}"
      th:data-max-file-size="${@streamixProperties.storage.maxFileSize}"
      th:data-streamix-sprite="@{/streamix/svg/icons.svg}">

<button type="button" class="streamix-mobile-toggle" data-streamix-mobile-toggle aria-label="메뉴 열기">
  <svg class="streamix-icon" aria-hidden="true">
    <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-list|"></use>
  </svg>
</button>
<div class="streamix-mobile-overlay" data-streamix-mobile-overlay></div>

<div class="streamix-app">

  <aside class="streamix-sidebar" aria-label="주 네비게이션">
    <div class="streamix-sidebar-mast streamix-fade-in" data-delay="1">
      <a class="streamix-sidebar-brand" th:href="@{${@streamixProperties.dashboard.path}}">
        <svg class="streamix-sidebar-brand-mark" aria-hidden="true">
          <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-broadcast-pin|"></use>
        </svg>
        <span>Streamix</span>
      </a>
      <div class="streamix-sidebar-issue streamix-meta">
        <span>Media Operations</span>
        <span aria-hidden="true">·</span>
        <span class="streamix-mono">v3.0.0</span>
      </div>
    </div>

    <nav class="streamix-nav streamix-fade-in" data-delay="2">
      <a class="streamix-nav-item"
         th:classappend="${currentMenu == 'dashboard' ? 'is-active' : ''}"
         th:href="@{${@streamixProperties.dashboard.path}}">
        <svg class="streamix-nav-icon" aria-hidden="true">
          <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-speedometer2|"></use>
        </svg>
        <span>대시보드</span>
      </a>
      <a class="streamix-nav-item"
         th:classappend="${currentMenu == 'files' ? 'is-active' : ''}"
         th:href="@{${@streamixProperties.dashboard.path} + '/files'}">
        <svg class="streamix-nav-icon" aria-hidden="true">
          <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-folder|"></use>
        </svg>
        <span>파일 관리</span>
      </a>
      <a class="streamix-nav-item"
         th:classappend="${currentMenu == 'sessions' ? 'is-active' : ''}"
         th:href="@{${@streamixProperties.dashboard.path} + '/sessions'}">
        <svg class="streamix-nav-icon" aria-hidden="true">
          <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-broadcast|"></use>
        </svg>
        <span>스트리밍 세션</span>
      </a>
    </nav>

    <div class="streamix-sidebar-foot streamix-fade-in" data-delay="3">
      <button type="button"
              class="streamix-btn streamix-btn--ghost streamix-btn--sm"
              data-streamix-theme-toggle
              aria-label="테마 변경">
        <svg class="streamix-icon" aria-hidden="true">
          <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-moon|"></use>
        </svg>
        <span data-streamix-theme-label>SYSTEM</span>
      </button>
    </div>
  </aside>

  <main class="streamix-main">
    <div class="streamix-main-inner streamix-fade-in" data-delay="2">

      <div th:if="${successMessage}" class="streamix-alert streamix-alert--success" role="status">
        <svg class="streamix-icon" aria-hidden="true">
          <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-check-circle|"></use>
        </svg>
        <span th:text="${successMessage}"></span>
        <button type="button" class="streamix-alert-close" data-streamix-alert-close aria-label="닫기">
          <svg class="streamix-icon streamix-icon--sm" aria-hidden="true">
            <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-x-lg|"></use>
          </svg>
        </button>
      </div>
      <div th:if="${errorMessage}" class="streamix-alert streamix-alert--error" role="alert">
        <svg class="streamix-icon" aria-hidden="true">
          <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-exclamation-triangle|"></use>
        </svg>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="streamix-alert-close" data-streamix-alert-close aria-label="닫기">
          <svg class="streamix-icon streamix-icon--sm" aria-hidden="true">
            <use th:attr="href=|@{/streamix/svg/icons.svg}#icon-x-lg|"></use>
          </svg>
        </button>
      </div>

      <div layout:fragment="content"></div>
    </div>
  </main>

</div>

<script type="module" th:src="@{/streamix/js/main.js}"></script>
</body>
</html>
